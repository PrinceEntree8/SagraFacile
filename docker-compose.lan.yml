# SagraFacile — LAN / Offline deployment
#
# Use this file to run SagraFacile on a local network (no internet or HTTPS required).
# All devices on the same network can reach the app at http://<server-ip>:<WEB_PORT>
#
# ┌─────────────────────────────────────────────────────────────────────────────┐
# │  SECURITY WARNING — change these defaults before deploying to any network   │
# │                                                                             │
# │  POSTGRES_PASSWORD  – database password                                     │
# │  Jwt__Key           – signing key for auth tokens (long random string)      │
# │  Seed__AdminPassword – initial admin account password                       │
# │                                                                             │
# │  Override with a .env file or environment variables:                        │
# │    cp .env.example .env   # edit the values, then run the compose command   │
# └─────────────────────────────────────────────────────────────────────────────┘

services:
  postgres:
    image: postgres:17-alpine
    container_name: sagrafacile-postgres-lan
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-SagraLAN-ChangeMe!}
      POSTGRES_DB: ${POSTGRES_DB:-sagrafacile}
    volumes:
      - postgres-data-lan:/var/lib/postgresql/data
    networks:
      - sagrafacile-lan-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sagrafacile-web-lan
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      # AllowHttp=true disables HTTPS redirect and HSTS so the app works over plain HTTP.
      - AllowHttp=true
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=${POSTGRES_DB:-sagrafacile};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-SagraLAN-ChangeMe!}
      # Change Jwt__Key to a long random string before sharing access with others.
      - Jwt__Key=${Jwt__Key:-SagraFacile-LAN-Replace-With-Your-Own-Random-Secret-Key!}
      - Jwt__Issuer=SagraFacile
      - Jwt__Audience=SagraFacile
      - Seed__AdminUsername=${Seed__AdminUsername:-admin}
      # Change Seed__AdminPassword to a strong password before deploying.
      - Seed__AdminPassword=${Seed__AdminPassword:-SagraAdmin-ChangeMe!}
      - Seed__AdminEmail=${Seed__AdminEmail:-admin@sagrafacile.local}
    ports:
      - "${WEB_PORT:-80}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sagrafacile-lan-network
    restart: always

volumes:
  postgres-data-lan:
    driver: local

networks:
  sagrafacile-lan-network:
    driver: bridge
