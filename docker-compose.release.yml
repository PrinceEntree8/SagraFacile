services:
  postgres:
    image: postgres:17-alpine
    container_name: sagrafacile-postgres-release
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-sagrafacile}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data-release:/var/lib/postgresql/data
    networks:
      - sagrafacile-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sagrafacile-web-release
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=${POSTGRES_DB:-sagrafacile};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}
      - Jwt__Key=${Jwt__Key:-}
      - Jwt__Issuer=${Jwt__Issuer:-SagraFacile}
      - Jwt__Audience=${Jwt__Audience:-SagraFacile}
      - Seed__AdminUsername=${Seed__AdminUsername:-admin}
      - Seed__AdminPassword=${Seed__AdminPassword:-}
      - Seed__AdminEmail=${Seed__AdminEmail:-admin@sagrafacile.local}
    ports:
      - "${WEB_PORT:-80}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sagrafacile-network
    restart: always

volumes:
  postgres-data-release:
    driver: local

networks:
  sagrafacile-network:
    driver: bridge
