name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build, test and validate Aspire manifest
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --no-restore -c Release

      - name: Run tests
        run: dotnet test --no-build -c Release --logger "console;verbosity=normal"

      - name: Validate Aspire manifest
        run: |
          dotnet run --project src/SagraFacile.AppHost/SagraFacile.AppHost.csproj \
            -c Release \
            -- --publisher manifest --output-path /tmp/aspire-manifest.json
